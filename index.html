<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>Coin Flip — bonk the bird!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1228; }
  #c {
    display: block; width: 100vw; height: 100vh;
    image-rendering: pixelated; image-rendering: crisp-edges;
    cursor: crosshair;
  }
</style>

<canvas id="c"></canvas>

<script>
// ────────────────────────────────────────────────────────────  pixel buffer
let VW = 640, VH = 360;                          // VH = zoom level (fixed); VW grows to fill the window width
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
const buf = document.createElement('canvas');
const g = buf.getContext('2d');

let scale = 1, DPR = 1;
function resize() {
  DPR = Math.min(devicePixelRatio || 1, 2);
  scale = (innerHeight * DPR) / VH;              // device px per logical px (fit height)
  VW = Math.ceil((innerWidth * DPR) / scale);    // widen logical view → fills width, no letterbox
  HAND_X = VW / 2;
  buf.width = VW; buf.height = VH;
  cv.width = Math.round(innerWidth * DPR); cv.height = Math.round(innerHeight * DPR);
  cv.style.width = innerWidth + 'px'; cv.style.height = innerHeight + 'px';
  ctx.imageSmoothingEnabled = false;
}
addEventListener('resize', resize);

// ────────────────────────────────────────────────────────────  palette
const DARK = '#241734';
const SKY_T = '#3aa6f0', SKY_M = '#84d0ff', SKY_B = '#c9eeff';
const PAL = {
  bird:'#ff5a72', birdDk:'#e23a59', belly:'#ffd9c2', beak:'#ffb02e', beakDk:'#e88a16',
  skin:'#f3b078', skinDk:'#d98a55',
  gold:'#ffd34d', goldDk:'#e0a31f', goldLt:'#fff0a8', goldEdge:'#caa015',
  superA:'#ff5ea8', superB:'#ff7ab6', superDk:'#a82e6a', superLt:'#ffd0ea', superEdge:'#c83a82',
  grass:'#76d36b', grassDk:'#57b657', hill:'#8de07f', hillDk:'#6fc864',
  cloud:'#ffffff', cloudSh:'#dff1ff', sun:'#ffe9a0', sunDk:'#ffd45e',
};
const TAU = Math.PI * 2;
let LW = 1.4;                                    // outline width (logical px)

// ────────────────────────────────────────────────────────────  draw helpers
function ell(x, y, rx, ry, fill, stroke = DARK) {
  g.beginPath(); g.ellipse(x, y, rx, ry, 0, 0, TAU);
  if (fill) { g.fillStyle = fill; g.fill(); }
  if (stroke) { g.lineWidth = LW; g.strokeStyle = stroke; g.stroke(); }
}
function circ(x, y, r, fill, stroke = DARK) { ell(x, y, r, r, fill, stroke); }
function tri(ax, ay, bx, by, cx, cy, fill, stroke = DARK) {
  g.beginPath(); g.moveTo(ax, ay); g.lineTo(bx, by); g.lineTo(cx, cy); g.closePath();
  if (fill) { g.fillStyle = fill; g.fill(); }
  if (stroke) { g.lineWidth = LW; g.strokeStyle = stroke; g.lineJoin = 'round'; g.stroke(); }
}
function rrect(x, y, w, h, r, fill, stroke = DARK) {
  g.beginPath(); g.roundRect(x, y, w, h, r);
  if (fill) { g.fillStyle = fill; g.fill(); }
  if (stroke) { g.lineWidth = LW; g.strokeStyle = stroke; g.stroke(); }
}
function shadow(x, y, rx) { g.beginPath(); g.ellipse(x, y, rx, rx * 0.34, 0, 0, TAU); g.fillStyle = 'rgba(20,12,30,0.18)'; g.fill(); }
function shadowA(x, y, rx, a) { g.beginPath(); g.ellipse(x, y, rx, rx * 0.34, 0, 0, TAU); g.fillStyle = `rgba(20,12,30,${a})`; g.fill(); }

// ────────────────────────────────────────────────────────────  world
const GROUND_Y = 300;
let HAND_X = VW / 2;
const GRAVITY = 700;
const POWER_MIN = 290, POWER_MAX = 720;   // punchier flips — more height and faster coins
const MAX_TILT = 1.1;                     // ~63° — throw well to the left/right

// ────────────────────────────────────────────────────────────  background bits
const clouds = [];
for (let i = 0; i < 8; i++) clouds.push({ x: Math.random() * VW, y: 22 + Math.random() * 130, s: 0.8 + Math.random() * 1.0, v: 3 + Math.random() * 5 });

function drawCloud(x, y, s) {
  g.save(); g.translate(x, y); g.scale(s, s);
  g.fillStyle = PAL.cloud;
  for (const [dx, dy, r] of [[-9,2,7],[0,-2,9],[9,2,7],[3,4,6],[-3,4,6]]) { g.beginPath(); g.ellipse(dx, dy, r, r, 0, 0, TAU); g.fill(); }
  g.fillStyle = PAL.cloudSh;
  for (const [dx, dy, r] of [[-9,5,5],[0,6,6],[9,5,5]]) { g.beginPath(); g.ellipse(dx, dy, r, r * 0.7, 0, 0, TAU); g.fill(); }
  g.restore();
}

function drawBackground(dt) {
  // sky gradient
  const grd = g.createLinearGradient(0, 0, 0, GROUND_Y);
  grd.addColorStop(0, SKY_T); grd.addColorStop(0.55, SKY_M); grd.addColorStop(1, SKY_B);
  g.fillStyle = grd; g.fillRect(0, 0, VW, GROUND_Y);
  // sun
  circ(38, 34, 16, PAL.sun, null); circ(38, 34, 11, PAL.sunDk, null);
  // clouds
  for (const c of clouds) { c.x += c.v * dt; if (c.x > VW + 24) c.x = -24; drawCloud(c.x, c.y, c.s); }
  // rolling hills
  g.fillStyle = PAL.hillDk; g.beginPath(); g.moveTo(0, GROUND_Y);
  for (let x = 0; x <= VW; x += 4) g.lineTo(x, GROUND_Y - 18 - Math.sin(x * 0.018) * 14); g.lineTo(VW, GROUND_Y); g.fill();
  g.fillStyle = PAL.hill; g.beginPath(); g.moveTo(0, GROUND_Y);
  for (let x = 0; x <= VW; x += 4) g.lineTo(x, GROUND_Y - 8 - Math.sin(x * 0.022 + 2) * 9); g.lineTo(VW, GROUND_Y); g.fill();
  // ground
  g.fillStyle = PAL.grass; g.fillRect(0, GROUND_Y, VW, VH - GROUND_Y);
  g.fillStyle = PAL.grassDk; g.fillRect(0, GROUND_Y, VW, 4);
}

// ────────────────────────────────────────────────────────────  birds (targets)
const TYPES = {
  sparrow: { r: 11, hp: 1, spd: 1.00, pts: 1, body: '#ff5a72', dk: '#e23a59', belly: '#ffd9c2' },
  pigeon:  { r: 15, hp: 2, spd: 0.62, pts: 2, body: '#94a6c8', dk: '#6c7fa6', belly: '#e2e9f6' },
  swift:   { r: 8,  hp: 1, spd: 1.75, pts: 1, body: '#54d6c2', dk: '#2fae9c', belly: '#d9fff8', zig: true },
  thief:   { r: 11, hp: 1, spd: 1.05, pts: 2, body: '#43435a', dk: '#27273a', belly: '#ececf4', thief: true },
  golden:  { r: 12, hp: 1, spd: 0.60, pts: 5, body: '#ffd34d', dk: '#e0a31f', belly: '#fff3b0', golden: true },
  gift:    { r: 12, hp: 1, spd: 0.72, pts: 2, body: '#b06bff', dk: '#7d3fd0', belly: '#ecd9ff', gift: true },
};
const POWERUPS = {
  triple:   { dur: 12, name: 'TRIPLE SHOT',    col: '#6ee7ff' },
  shotgun:  { dur: 12, name: 'SHOTGUN',        col: '#ffb02e' },
  big:      { dur: 12, name: 'BIG COINS',      col: '#7dffb0' },
  slowmo:   { dur: 8,  name: 'SLOW-MO',        col: '#c89bff' },
  infinite: { dur: 10, name: 'UNLIMITED AMMO', col: '#ffd34d' },
};
const PU_KEYS = Object.keys(POWERUPS);
const birds = [];

function pickType(s) {
  if (Math.random() < (hearts < HEART_MAX ? 0.05 : 0.025)) return 'golden';   // rare bonus, likelier when hurt
  if (s >= 5 && Math.random() < 0.07) return 'gift';                          // power-up carrier
  const w = [['sparrow', 5]];
  if (s >= 8) w.push(['pigeon', 2.5]);
  if (s >= 12) w.push(['thief', 2]);
  if (s >= 24) w.push(['swift', 3]);
  let tot = 0; for (const e of w) tot += e[1];
  let r = Math.random() * tot;
  for (const [t, x] of w) { if ((r -= x) <= 0) return t; }
  return 'sparrow';
}
function spawnGap(s) { return Math.max(1.1, 2.6 - s * 0.03); }                  // 2.6s → 1.1s, gentler cadence
function maxBirds(s) { return s < 12 ? 1 : s < 50 ? 2 : 3; }                    // usually 1-2; only 3 very late
function speedMul(s) { return 1 + s * 0.012; }

function spawnOne() {
  const t = pickType(score), T = TYPES[t];
  const dir = Math.random() < 0.5 ? 1 : -1;
  const baseY = 38 + Math.random() * 175;
  const b = {
    type: t, r: T.r, hp: T.hp, pts: T.pts, dir, baseY, x: dir > 0 ? -26 : VW + 26, y: baseY,
    vx: dir * (40 + Math.random() * 24) * T.spd * speedMul(score),
    flap: Math.random() * TAU, bob: Math.random() * TAU, hitFlash: 0,
    bobAmp: T.zig ? 11 : 3.5, bobSpd: T.zig ? 11 : 6,
    swoopAmp: score >= 14 ? 14 + Math.random() * 24 : 0, swoopSpd: 0.5 + Math.random() * 0.5, swoopPhase: Math.random() * TAU,
  };
  if (t === 'gift') b.pu = PU_KEYS[Math.floor(Math.random() * PU_KEYS.length)];
  birds.push(b);
}

function drawBird(b) {
  const T = TYPES[b.type], s = b.r / 11, flap = Math.sin(b.flap);
  g.save(); g.translate(b.x, b.y);
  shadow(0, GROUND_Y - b.y + 2, b.r);
  g.scale(b.dir * s, s);
  if (T.golden) { g.globalAlpha = 0.45; circ(0, 0, 14, '#fff7c8', null); g.globalAlpha = 1; }  // glow
  if (T.gift) { g.globalAlpha = 0.4; circ(0, 0, 14, '#e3c2ff', null); g.globalAlpha = 1; }
  tri(-9, -3, -9, 4, -16, 0, T.dk);                                            // tail
  ell(0, 0, 11, 9.5, T.body);                                                  // body
  g.beginPath(); g.ellipse(2, 3, 7, 5.5, 0, 0, TAU); g.fillStyle = T.belly; g.fill();   // belly
  tri(10, -2, 10, 3, 16, 0.5, PAL.beak); tri(10, 0.5, 10, 3, 15, 1.2, PAL.beakDk, null); // beak
  circ(6, -3, 2.4, '#fff'); circ(6.6, -3, 1.1, DARK, null);                              // eye
  if (T.thief) { g.fillStyle = DARK; g.beginPath(); g.ellipse(5.6, -3, 3.6, 2.3, 0, 0, TAU); g.fill(); circ(6.6, -3, 1, '#fff', null); }   // bandit mask
  g.save(); g.translate(-1, -3); g.rotate(flap * 0.6); ell(-3, 2, 6.5, 3.4, T.dk); g.restore();   // wing
  if (b.hitFlash > 0) { g.globalAlpha = Math.min(0.85, b.hitFlash * 5); circ(0, 0, 11.5, '#fff', null); g.globalAlpha = 1; }
  g.restore();
  if (T.gift && b.pu) {                          // floating power-up icon, unflipped
    const iy = b.y - b.r - 9;
    rrect(b.x - 10, iy - 8, 20, 16, 4, '#fff', DARK);
    drawPUIcon(b.pu, b.x, iy, POWERUPS[b.pu].col);
  }
}

function drawPUIcon(type, x, y, col) {
  g.fillStyle = col; g.strokeStyle = col; g.lineWidth = 1.4;
  if (type === 'triple' || type === 'shotgun') {
    const n = type === 'triple' ? 3 : 5;
    for (let i = 0; i < n; i++) { const a = (i - (n - 1) / 2) * 0.5; g.beginPath(); g.ellipse(x + Math.sin(a) * 5, y + 1 - Math.cos(a) * 1.5, 1.5, 1.5, 0, 0, TAU); g.fill(); }
  } else if (type === 'big') {
    g.beginPath(); g.ellipse(x, y, 5, 5, 0, 0, TAU); g.fill();
  } else if (type === 'slowmo') {
    g.beginPath(); g.ellipse(x, y, 5, 5, 0, 0, TAU); g.stroke();
    g.beginPath(); g.moveTo(x, y); g.lineTo(x, y - 3.4); g.moveTo(x, y); g.lineTo(x + 2.4, y); g.stroke();
  } else if (type === 'infinite') {
    g.beginPath(); g.ellipse(x - 2.4, y, 2.4, 2.4, 0, 0, TAU); g.stroke();
    g.beginPath(); g.ellipse(x + 2.4, y, 2.4, 2.4, 0, 0, TAU); g.stroke();
  }
}

function drawHeart(cx, cy, s, filled) {
  g.beginPath();
  g.moveTo(cx, cy + s * 0.95);
  g.bezierCurveTo(cx - s * 1.5, cy - s * 0.5, cx - s * 0.55, cy - s * 1.2, cx, cy - s * 0.35);
  g.bezierCurveTo(cx + s * 0.55, cy - s * 1.2, cx + s * 1.5, cy - s * 0.5, cx, cy + s * 0.95);
  g.closePath();
  g.fillStyle = filled ? '#ff5a72' : 'rgba(20,12,30,0.22)'; g.fill();
  g.lineWidth = LW; g.strokeStyle = DARK; g.stroke();
}

// ────────────────────────────────────────────────────────────  hand + coin
let aimAng = 0, handDip = 0, flickT = 0;
function computeAim(mx, my) {
  const ax = mx - HAND_X, ay = Math.max(6, (GROUND_Y - 14) - my);
  aimAng = Math.max(-MAX_TILT, Math.min(MAX_TILT, Math.atan2(ax, ay)));
}
function aimDir() { return { x: Math.sin(aimAng), y: -Math.cos(aimAng) }; }

function handTop() {  // world position where the coin sits / launches from
  const baseY = GROUND_Y - 14 - handDip + (flickT > 0 ? -Math.sin((1 - flickT / 0.22) * Math.PI) * 7 : 0);
  return { x: HAND_X + Math.sin(aimAng) * 7, y: baseY - 6 };
}
function drawHand() {
  const droop = state === 'over' ? Math.min(1.2, overT * 1.6) : 0;   // sags after game over
  const t = handTop();
  // forearm
  g.save(); g.translate(HAND_X, GROUND_Y); g.rotate(aimAng * 0.4 + droop);
  rrect(-6, -2, 12, 70, 5, PAL.skin);
  g.restore();
  // fist
  g.save(); g.translate(t.x + droop * 10, t.y + 8 + droop * 6); g.rotate(aimAng * 0.5 + droop);
  ell(0, 0, 9, 8, PAL.skin);
  // knuckle lines
  g.strokeStyle = PAL.skinDk; g.lineWidth = 1;
  for (let i = -1; i <= 1; i++) { g.beginPath(); g.moveTo(i * 4, -6); g.lineTo(i * 4, -1); g.stroke(); }
  // thumb (flicks up on release)
  const thumbUp = flickT > 0 ? Math.sin((1 - flickT / 0.22) * Math.PI) : (charging ? charge * 0.3 : 0);
  g.save(); g.translate(-7, -3); g.rotate(-0.5 - thumbUp * 0.8); ell(0, -3, 3, 5, PAL.skin); g.restore();
  g.restore();
}

// coin: tumbles end-over-end (squash vertically) → heads · edge · tails
function drawCoin(x, y, spin, flying, charged, baseR = 6) {
  // apex scaling — a touch bigger the higher it is, for a "toward camera" feel
  const hf = flying ? Math.max(0, Math.min(1, (GROUND_Y - y) / (GROUND_Y - 50))) : 0;
  const r = baseR * (1 + hf * 0.3);
  // ground shadow shrinks + fades as it climbs
  if (flying) shadowA(x, GROUND_Y - 1, baseR * (0.45 + (1 - hf) * 0.8), 0.05 + (1 - hf) * 0.16);

  // super (charged) coins recolour to hot pink
  const FACE = charged ? PAL.superA : PAL.gold, FACE2 = charged ? PAL.superB : '#f4c233';
  const EDGE = charged ? PAL.superEdge : PAL.goldEdge, EDGEDK = charged ? PAL.superDk : PAL.goldDk, LT = charged ? PAL.superLt : PAL.goldLt;

  const c = Math.cos(spin);
  const ry = Math.abs(c) * r;                     // face height collapses to the edge
  if (ry < r * 0.16) {
    // edge-on — a thin horizontal rim with milled ridges
    const ew = r * 1.9, eh = Math.max(1.6, r * 0.36);
    rrect(x - ew / 2, y - eh / 2, ew, eh, eh / 2, EDGE);
    g.strokeStyle = EDGEDK; g.lineWidth = 0.8;
    for (let i = -2; i <= 2; i++) { g.beginPath(); g.moveTo(x + i * ew * 0.17, y - eh / 2 + 0.6); g.lineTo(x + i * ew * 0.17, y + eh / 2 - 0.6); g.stroke(); }
  } else {
    const heads = c > 0;
    g.beginPath(); g.ellipse(x, y, r, ry, 0, 0, TAU);
    g.fillStyle = heads ? FACE : FACE2; g.lineWidth = LW; g.strokeStyle = DARK; g.fill(); g.stroke();
    // inner rim
    g.beginPath(); g.ellipse(x, y, r * 0.7, ry * 0.7, 0, 0, TAU); g.strokeStyle = EDGE; g.lineWidth = 1; g.stroke();
    // emblem (squashed to match the face): heads = star, tails = diamond
    g.save(); g.translate(x, y); g.scale(1, Math.abs(c));
    if (heads) drawStar(0, 0, r * 0.42, LT);
    else { g.beginPath(); g.moveTo(0, -r * 0.42); g.lineTo(r * 0.32, 0); g.lineTo(0, r * 0.42); g.lineTo(-r * 0.32, 0); g.closePath(); g.fillStyle = LT; g.fill(); }
    g.restore();
    // specular highlight
    g.globalAlpha = 0.85; g.beginPath(); g.ellipse(x - r * 0.32, y - ry * 0.34, r * 0.16, ry * 0.16, 0, 0, TAU); g.fillStyle = '#fff'; g.fill(); g.globalAlpha = 1;
  }
}

const coins = [];                       // every coin currently in flight
const COIN_R = 6;
function spawnCoin(x, y, vx, vy, spinV, r = COIN_R) {
  coins.push({ x, y, vx, vy, spin: 0, spinV, r, charged: false });
  if (coins.length > 28) coins.shift();   // cap, just in case
}

// ────────────────────────────────────────────────────────────  trajectory preview
function drawTrajectory(power) {
  const d = aimDir();
  let px = handTop().x, py = handTop().y, vx = d.x * power, vy = d.y * power;
  g.fillStyle = 'rgba(255,255,255,0.85)';
  for (let i = 0; i < 60; i++) {
    vy += GRAVITY * 0.02; px += vx * 0.02; py += vy * 0.02;
    if (py > GROUND_Y) break;
    if (i % 4 === 0) { g.beginPath(); g.ellipse(px, py, 1.1, 1.1, 0, 0, TAU); g.fill(); }
  }
}
function drawSling() {                              // band + knob showing the pull
  const t = handTop();
  const dx = pointer.x - dragStart.x, dy = pointer.y - dragStart.y, len = Math.hypot(dx, dy) || 1;
  const vl = Math.min(len, VIS_PULL);
  const kx = t.x + dx / len * vl, ky = t.y + dy / len * vl;   // knob sits in the drag direction
  g.lineCap = 'round';
  g.strokeStyle = DARK; g.lineWidth = 4.5; g.beginPath(); g.moveTo(t.x, t.y); g.lineTo(kx, ky); g.stroke();
  g.strokeStyle = '#ffe9a0'; g.lineWidth = 2; g.beginPath(); g.moveTo(t.x, t.y); g.lineTo(kx, ky); g.stroke();
  const col = charge < 0.5 ? '#6ee7ff' : charge < 0.82 ? '#ffd34d' : '#ff6b6b';
  circ(kx, ky, 5.5, col, DARK);
}

// ────────────────────────────────────────────────────────────  particles + popups
const parts = [], pops = [];
function sparkle(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = (i / n) * TAU + Math.random(), sp = 40 + Math.random() * 90;
    parts.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 30, life: 0.6, col: color, star: Math.random() < 0.5 });
  }
}
function burst(x, y, color) { sparkle(x, y, color, 16); }
function popText(x, y, text, col) { pops.push({ x, y, text, col, t: 0.9 }); }
function drawStar(x, y, r, col) {
  g.beginPath();
  for (let i = 0; i < 10; i++) { const a = i * Math.PI / 5 - Math.PI / 2, rr = i % 2 ? r * 0.45 : r; const px = x + Math.cos(a) * rr, py = y + Math.sin(a) * rr; i ? g.lineTo(px, py) : g.moveTo(px, py); }
  g.closePath(); g.fillStyle = col; g.fill();
}

// ────────────────────────────────────────────────────────────  HUD (drawn into the pixel buffer)
function text(str, x, y, size, col, align = 'left') {
  g.font = `700 ${size}px "Arial Black", Arial, sans-serif`;
  g.textAlign = align; g.textBaseline = 'alphabetic';
  g.lineJoin = 'round'; g.lineWidth = 2.4; g.strokeStyle = DARK; g.strokeText(str, x, y);
  g.fillStyle = col; g.fillText(str, x, y);
}
function drawHUD() {
  text('SCORE', 9, 18, 11, '#fff');
  text(String(score), 9, 40, 24, PAL.gold);
  if (best) text('BEST ' + best, 9, 56, 10, '#ffe9a0');
  // hearts, top-right
  for (let i = 0; i < HEART_MAX; i++) drawHeart(VW - 32 - (HEART_MAX - 1 - i) * 17, 18, 6.5, i < hearts);
  // energy bar — coin ammo, top centre
  const n = AMMO_MAX, cs = 13, gap = 7, tw = n * cs + (n - 1) * gap, ex = (VW - tw) / 2;
  for (let i = 0; i < n; i++) {
    const cx = ex + cs / 2 + i * (cs + gap), cy = 16 + cs / 2;
    circ(cx, cy, cs / 2, 'rgba(20,12,30,0.22)', DARK);            // empty socket
    if (i < ammo) { circ(cx, cy, cs / 2 - 1.5, PAL.gold, DARK); drawStar(cx, cy, cs * 0.2, PAL.goldLt); }
    else if (i === ammo) {                                        // the one regenerating now
      const p = Math.min(1, regenT / REGEN_TIME);
      g.beginPath(); g.moveTo(cx, cy); g.arc(cx, cy, cs / 2 - 1.5, -Math.PI / 2, -Math.PI / 2 + p * TAU); g.closePath();
      g.fillStyle = 'rgba(255,211,77,0.55)'; g.fill();
    }
  }
  if (power) {
    const P = POWERUPS[power];
    text(P.name, VW / 2, 44, 9, P.col, 'center');
    const bw = 78, bx = (VW - bw) / 2;
    rrect(bx, 48, bw, 4, 2, '#0006', DARK);
    rrect(bx, 48, bw * Math.max(0, powerT / P.dur), 4, 2, P.col, null);
  } else if (streak >= 3) text(streak + 'x', VW / 2, 46, 11, PAL.gold, 'center');
  // charge meter / hint
  if (state === 'over') return;
  if (charging) {
    const bw = 180, bx = (VW - bw) / 2, by = VH - 16;
    rrect(bx, by, bw, 7, 3, '#0006', DARK);
    const grd = g.createLinearGradient(bx, 0, bx + bw, 0);
    grd.addColorStop(0, '#6ee7ff'); grd.addColorStop(0.5, PAL.gold); grd.addColorStop(1, '#ff6b6b');
    rrect(bx + 1, by + 1, (bw - 2) * charge, 5, 2, grd, null);
  } else if (ammo <= 0) {
    text('OUT OF COINS — RECHARGING…', VW / 2, VH - 8, 10, '#ffd66b', 'center');
  } else {
    text('DRAG TO AIM + POWER  ·  RELEASE TO FLING', VW / 2, VH - 8, 10, '#fff', 'center');
  }
}

// ────────────────────────────────────────────────────────────  game state
let score = 0, streak = 0;
let best = +(localStorage.getItem('coinflip_best') || 0);
let charging = false, charge = 0;
const CHARGE_RATE = 1.55;
let shake = 0;
const AMMO_MAX = 3, REGEN_TIME = 3;     // 3 coins; one back every 3s
let ammo = AMMO_MAX, regenT = 0;
const HEART_MAX = 3;
let hearts = HEART_MAX, state = 'play', spawnT = 0.6, stage = 1, banner = null, flashRed = 0, overT = 0;
let power = null, powerT = 0;            // active power-up + remaining seconds

// input
let pointer = { x: VW / 2, y: 40 };
let dragging = false; const dragStart = { x: 0, y: 0 };
const MAX_PULL = 150, DEAD_PULL = 12, VIS_PULL = 42;   // slingshot: pull distance → power
function toLogical(cx, cy) { return { x: cx / innerWidth * VW, y: cy / innerHeight * VH }; }
function inRect(p, r) { return p.x >= r.x && p.x <= r.x + r.w && p.y >= r.y && p.y <= r.y + r.h; }
function pauseBtn() { return { x: VW - 20, y: 6, w: 16, h: 15 }; }
function ctrBtn(w, h, cy) { return { x: (VW - w) / 2, y: cy, w, h }; }
function resumeBtn() { return ctrBtn(96, 24, VH / 2 + 6); }
function retryBtn() { return ctrBtn(118, 26, VH / 2 + 42); }
function pauseGame() { if (state === 'play') { state = 'paused'; charging = false; dragging = false; } }
function togglePause() { if (state === 'play') pauseGame(); else if (state === 'paused') state = 'play'; }
function onDown(p) {
  resumeAudio();
  if (state === 'over') { if (overT > 0.5 && inRect(p, retryBtn())) restart(); return; }   // deliberate confirm only
  if (state === 'paused') { if (inRect(p, resumeBtn())) state = 'play'; return; }
  if (inRect(p, pauseBtn())) { pauseGame(); return; }
  beginDrag(p);
}
function onUp() { if (state === 'play') endDrag(); }
function beginDrag(p) {
  if (ammo <= 0) return;
  dragging = true; charging = true; charge = 0;
  dragStart.x = p.x; dragStart.y = p.y;
  updateDrag(p);
}
function updateDrag(p) {
  if (!dragging) return;
  const dx = p.x - dragStart.x, dy = p.y - dragStart.y, len = Math.hypot(dx, dy);
  charge = Math.max(0, Math.min(1, (len - DEAD_PULL) / (MAX_PULL - DEAD_PULL)));
  aimAng = Math.max(-MAX_TILT, Math.min(MAX_TILT, Math.atan2(-dx, dy)));   // fling opposite the pull
}
function endDrag() {
  if (!dragging) return;
  dragging = false;
  if (charge > 0) release(); else charging = false;   // a tiny tap just cancels, no coin spent
}
function release() {
  if (!charging) return; charging = false;
  if (ammo <= 0) return;
  if (power !== 'infinite') ammo--;
  const pwr = POWER_MIN + (POWER_MAX - POWER_MIN) * charge;
  const d = aimDir(), t = handTop(), baseSpin = 11 + charge * 32;
  const r = power === 'big' ? COIN_R * 1.9 : COIN_R;
  let shots = 1, spread = 0;
  if (power === 'triple') { shots = 3; spread = 0.17; }
  else if (power === 'shotgun') { shots = 6; spread = 0.11; }
  for (let i = 0; i < shots; i++) {
    const off = shots === 1 ? 0 : (i - (shots - 1) / 2) * spread;   // fan the spread around the aim
    const ca = Math.cos(off), sa = Math.sin(off);
    spawnCoin(t.x, t.y, (d.x * ca - d.y * sa) * pwr, (d.x * sa + d.y * ca) * pwr, baseSpin, r);
  }
  flickT = 0.22;
  beep(220 + charge * 520, 0.16, 'triangle', 0.06);
}
addEventListener('mousemove', e => { pointer = toLogical(e.clientX, e.clientY); if (dragging) updateDrag(pointer); });
addEventListener('mousedown', e => { pointer = toLogical(e.clientX, e.clientY); onDown(pointer); });
addEventListener('mouseup', onUp);
addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); if (!e.repeat && state === 'play' && ammo > 0 && !dragging) { resumeAudio(); charging = true; charge = 0; aimAng = 0; } }
  else if (e.code === 'KeyP' || e.code === 'Escape') { e.preventDefault(); togglePause(); }
  else if ((e.code === 'Enter' || e.code === 'KeyR') && state === 'over' && overT > 0.5) restart();
});
addEventListener('keyup', e => { if (e.code === 'Space') { e.preventDefault(); if (state === 'play' && charging && !dragging) release(); } });
addEventListener('touchstart', e => { const t = e.touches[0]; pointer = toLogical(t.clientX, t.clientY); onDown(pointer); e.preventDefault(); }, { passive: false });
addEventListener('touchmove', e => { const t = e.touches[0]; pointer = toLogical(t.clientX, t.clientY); if (dragging) updateDrag(pointer); e.preventDefault(); }, { passive: false });
addEventListener('touchend', e => { onUp(); e.preventDefault(); }, { passive: false });

// ────────────────────────────────────────────────────────────  audio
let actx;
function resumeAudio() { try { actx = actx || new (AudioContext || webkitAudioContext)(); actx.resume && actx.resume(); } catch (e) {} }
function beep(freq, dur, type = 'sine', gain = 0.06) {
  if (!actx) return;
  try { const o = actx.createOscillator(), gn = actx.createGain(); o.type = type; o.frequency.value = freq; gn.gain.value = gain;
    o.connect(gn); gn.connect(actx.destination); o.start();
    o.frequency.exponentialRampToValueAtTime(freq * 0.6, actx.currentTime + dur);
    gn.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + dur); o.stop(actx.currentTime + dur);
  } catch (e) {}
}

function hitBird(bi, coin) {
  const b = birds[bi];
  b.hp -= coin.charged ? 2 : 1;            // a super coin one-shots a pigeon
  b.hitFlash = 0.2;
  if (b.hp > 0) { sparkle(b.x, b.y, '#fff', 6); beep(320, 0.05, 'square', 0.05); return; }   // tank survives the hit
  const sup = coin.charged, T = TYPES[b.type], pts = b.pts * (sup ? 3 : 1);
  score += pts; streak++;
  if (score > best) { best = score; localStorage.setItem('coinflip_best', best); }
  if (T.golden) { hearts = Math.min(HEART_MAX, hearts + 1); popText(b.x, b.y - 16, '+LIFE', '#ff8aa0'); }
  if (T.gift && b.pu) { power = b.pu; powerT = POWERUPS[b.pu].dur; banner = { text: POWERUPS[b.pu].name + '!', t: 1.6 }; beep(600, 0.1, 'square', 0.06); setTimeout(() => beep(1200, 0.12, 'square', 0.05), 90); }
  burst(b.x, b.y, sup ? PAL.superA : (T.gift ? '#c89bff' : PAL.gold));
  popText(b.x, b.y - 10, sup ? `+${pts}!` : (pts > 1 ? `+${pts}` : (streak >= 3 ? 'NICE!' : 'BONK!')), sup ? PAL.superA : PAL.gold);
  beep(sup ? 990 : 880, 0.1, 'square', 0.07); setTimeout(() => beep(sup ? 1560 : 1320, 0.12, 'square', 0.05), 60);
  shake = sup ? 7 : 5;
  if (T.r >= 14) { shake = Math.max(shake, 13); beep(110, 0.18, 'sawtooth', 0.06); }   // big bird lands with a thud
  ammo = Math.min(AMMO_MAX, ammo + 1);     // bonk refunds a coin
  birds.splice(bi, 1);
  checkStage();
}
function escapeBird(bi) {
  const b = birds[bi], T = TYPES[b.type];
  birds.splice(bi, 1);
  if (T.golden || T.gift) return;          // bonus birds: missing them just forfeits the bonus
  streak = 0;
  if (T.thief && ammo > 0) { ammo--; popText(b.dir > 0 ? VW - 44 : 44, 70, 'COIN STOLEN!', '#ff6b6b'); beep(170, 0.22, 'sawtooth', 0.06); }
  loseHeart();
}
function loseHeart() {
  hearts--; shake = 8; flashRed = 0.32; beep(160, 0.18, 'sawtooth', 0.07);
  if (hearts <= 0) gameOver();
}
function checkStage() {
  const ns = Math.floor(score / 10) + 1;
  if (ns > stage) { stage = ns; banner = { text: 'STAGE ' + stage, t: 1.5 }; beep(680, 0.12, 'square', 0.05); setTimeout(() => beep(1020, 0.14, 'square', 0.04), 120); }
}
function gameOver() {
  state = 'over'; overT = 0; charging = false; dragging = false;
  beep(220, 0.5, 'sawtooth', 0.08); setTimeout(() => beep(120, 0.6, 'sawtooth', 0.07), 160);
  for (let k = 0; k < ammo; k++) spawnCoin(HAND_X + (Math.random() * 22 - 11), GROUND_Y - 30, Math.random() * 220 - 110, -160 - Math.random() * 120, 22);
  ammo = 0;
}
function restart() {
  score = 0; streak = 0; hearts = HEART_MAX; ammo = AMMO_MAX; regenT = 0; stage = 1;
  coins.length = 0; birds.length = 0; parts.length = 0; pops.length = 0;
  spawnT = 0.5; banner = null; flashRed = 0; overT = 0; power = null; powerT = 0; dragging = false; state = 'play';
}
function drawButton(r, label, col) {
  rrect(r.x, r.y, r.w, r.h, 6, col, DARK);
  text(label, r.x + r.w / 2, r.y + r.h / 2 + 4, 12, '#fff', 'center');
}
function drawPauseBtn() {
  const r = pauseBtn();
  rrect(r.x, r.y, r.w, r.h, 3, 'rgba(20,12,30,0.35)', DARK);
  g.fillStyle = '#fff'; g.fillRect(r.x + 5, r.y + 4, 2.5, r.h - 8); g.fillRect(r.x + r.w - 7.5, r.y + 4, 2.5, r.h - 8);
}
function drawPaused() {
  g.fillStyle = 'rgba(20,12,30,0.5)'; g.fillRect(0, 0, VW, VH);
  text('PAUSED', VW / 2, VH / 2 - 16, 28, '#fff', 'center');
  drawButton(resumeBtn(), 'RESUME', '#3aa6f0');
  text('P / ESC TO RESUME', VW / 2, VH / 2 + 50, 9, '#d8e2ef', 'center');
}
function drawGameOver() {
  g.fillStyle = `rgba(20,12,30,${Math.min(0.62, overT * 0.9)})`; g.fillRect(0, 0, VW, VH);
  text('GAME OVER', VW / 2, VH / 2 - 30, 30, '#ff6b8a', 'center');
  text('SCORE ' + score, VW / 2, VH / 2 - 4, 16, '#fff', 'center');
  text('BEST ' + best, VW / 2, VH / 2 + 14, 12, '#ffe9a0', 'center');
  if (overT > 0.5) { drawButton(retryBtn(), 'RETRY', '#3aa6f0'); text('ENTER / R', VW / 2, VH / 2 + 84, 9, '#d8e2ef', 'center'); }
}

// ────────────────────────────────────────────────────────────  main loop
let prev = performance.now();
resize();
function frame(now) {
  let dt = Math.min((now - prev) / 1000, 0.033); prev = now;
  if (state === 'paused') dt = 0;            // freeze the whole sim, keep rendering
  const wdt = (state === 'play' && charging ? 0.55 : 1) * dt;   // slight bullet-time while aiming

  // update aim / charge / hand pose
  if (state === 'play' && !charging) aimAng += (0 - aimAng) * Math.min(1, dt * 10);   // hand eases upright when idle
  if (charging) { if (!dragging) charge = Math.min(1, charge + dt * CHARGE_RATE); handDip = charge * 5; } else handDip = 0;
  if (flickT > 0) flickT -= dt;
  // passive coin regen
  if (ammo < AMMO_MAX) { regenT += dt; if (regenT >= REGEN_TIME) { ammo++; regenT -= REGEN_TIME; } } else regenT = 0;
  if (power) { powerT -= dt; if (powerT <= 0) power = null; }

  // spawn + move birds (only while alive)
  if (state === 'play') {
    spawnT -= dt;
    if (spawnT <= 0) {
      if (birds.length < maxBirds(score)) { spawnOne(); spawnT = spawnGap(score) * (0.7 + Math.random() * 0.6); }
      else spawnT = 0.3;
    }
    const bdt = (power === 'slowmo' ? 0.4 : 1) * wdt;    // slow-mo power-up + aim bullet-time
    for (let bi = birds.length - 1; bi >= 0; bi--) {
      const b = birds[bi];
      b.x += b.vx * bdt; b.flap += bdt * 14; b.bob += bdt * b.bobSpd; b.swoopPhase += bdt * b.swoopSpd;
      b.y = Math.max(26, Math.min(GROUND_Y - 28, b.baseY + Math.sin(b.bob) * b.bobAmp + Math.sin(b.swoopPhase) * b.swoopAmp));
      if (b.hitFlash > 0) b.hitFlash -= dt;
      if ((b.dir > 0 && b.x > VW + 28) || (b.dir < 0 && b.x < -28)) escapeBird(bi);
    }
  }

  // coins: integrate, hit a bird, fall off the world
  for (let i = coins.length - 1; i >= 0; i--) {
    const c = coins[i];
    c.vy += GRAVITY * wdt; c.x += c.vx * wdt; c.y += c.vy * wdt; c.spin += c.spinV * wdt;
    let hit = -1;
    if (state === 'play') for (let bi = 0; bi < birds.length; bi++) { const b = birds[bi], dx = c.x - b.x, dy = c.y - b.y, rr = b.r + c.r - 2; if (dx * dx + dy * dy < rr * rr) { hit = bi; break; } }
    if (hit >= 0) { hitBird(hit, c); coins.splice(i, 1); continue; }
    if (c.y > GROUND_Y + 4 || c.x < -12 || c.x > VW + 12) coins.splice(i, 1);
  }
  // coin-on-coin elastic bounce (equal mass)
  for (let i = 0; i < coins.length; i++) for (let j = i + 1; j < coins.length; j++) {
    const a = coins[i], b = coins[j];
    const dx = b.x - a.x, dy = b.y - a.y, rsum = a.r + b.r - 1, d2 = dx * dx + dy * dy;
    if (d2 < rsum * rsum && d2 > 0.0001) {
      const d = Math.sqrt(d2), nx = dx / d, ny = dy / d;
      const vn = (a.vx - b.vx) * nx + (a.vy - b.vy) * ny;   // closing speed along normal
      if (vn > 0) {
        const imp = (1 + 0.85) * vn / 2;                    // restitution 0.85
        a.vx -= imp * nx; a.vy -= imp * ny; b.vx += imp * nx; b.vy += imp * ny;
        a.spinV = 11 + Math.abs(imp) * 0.4; b.spinV = 11 + Math.abs(imp) * 0.4;
        const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
        if (!a.charged || !b.charged) {                     // first clink → power both up + refund
          a.charged = b.charged = true;
          ammo = Math.min(AMMO_MAX, ammo + 1);
          sparkle(mx, my, '#ff8ccb', 12);
          popText(mx, my - 4, '3x!', PAL.superA);
          beep(740, 0.08, 'square', 0.05); setTimeout(() => beep(1180, 0.1, 'square', 0.04), 55);
        } else {
          sparkle(mx, my, PAL.superLt, 6);
          beep(1500, 0.05, 'square', 0.04);
        }
      }
      const ov = (rsum - d) / 2; a.x -= nx * ov; a.y -= ny * ov; b.x += nx * ov; b.y += ny * ov;
    }
  }

  // particles / popups
  for (let i = parts.length - 1; i >= 0; i--) { const p = parts[i]; p.vy += GRAVITY * 0.6 * wdt; p.x += p.vx * wdt; p.y += p.vy * wdt; p.life -= wdt; if (p.life <= 0) parts.splice(i, 1); }
  for (let i = pops.length - 1; i >= 0; i--) { const p = pops[i]; p.y -= dt * 22; p.t -= dt; if (p.t <= 0) pops.splice(i, 1); }
  if (shake > 0) shake -= dt * 30;
  if (banner) { banner.t -= dt; if (banner.t <= 0) banner = null; }
  if (flashRed > 0) flashRed -= dt;
  if (state === 'over') overT += dt;

  // ───── render to pixel buffer
  g.save();
  if (shake > 0) g.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
  drawBackground(dt);
  for (const b of birds) drawBird(b);
  for (const c of coins) drawCoin(c.x, c.y, c.spin, true, c.charged, c.r);   // coins in flight (behind the hand)
  drawHand();
  if (state === 'play') {
    if (dragging) drawSling();
    const ht = handTop(); if (ammo > 0) drawCoin(ht.x, ht.y, 0, false, false);  // next coin, if you have one
    if (charging) drawTrajectory(POWER_MIN + (POWER_MAX - POWER_MIN) * charge);
  }
  for (const p of parts) { const a = Math.max(0, p.life / 0.6); g.globalAlpha = a; if (p.star) drawStar(p.x, p.y, 3, p.col); else { g.fillStyle = p.col; g.beginPath(); g.ellipse(p.x, p.y, 1.6, 1.6, 0, 0, TAU); g.fill(); } }
  g.globalAlpha = 1;
  for (const p of pops) { g.globalAlpha = Math.min(1, p.t / 0.4); text(p.text, p.x, p.y, 18, p.col, 'center'); }
  g.globalAlpha = 1;
  if (banner) { g.globalAlpha = Math.min(1, banner.t / 0.4); text(banner.text, VW / 2, 82, 24, '#fff', 'center'); g.globalAlpha = 1; }
  if (flashRed > 0) { g.fillStyle = `rgba(255,46,66,${flashRed * 0.5})`; g.fillRect(0, 0, VW, VH); }
  drawHUD();
  if (state === 'play') drawPauseBtn();
  if (state === 'paused') drawPaused();
  if (state === 'over') drawGameOver();
  g.restore();

  // ───── blit to fill the screen, no smoothing → crisp pixels
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(buf, 0, 0, VW, VH, 0, 0, cv.width, cv.height);

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
